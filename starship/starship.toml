# ~/.config/starship.toml

add_newline = true
command_timeout = 1000

format = """
[┌─](bold green)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$fill\
$nodejs\
$python\
$rust\
$golang\
$lua\
$docker_context\
$cmd_duration\

[└─](bold green)$character"""

# Right prompt: time + battery
right_format = """$battery$time"""

# === PROMPT CHARACTER ===
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[N](bold green)"
vimcmd_replace_symbol = "[R](bold purple)"
vimcmd_replace_one_symbol = "[R](bold purple)"
vimcmd_visual_symbol = "[V](bold yellow)"

# === FILL ===
# Pushes language modules to the right on the first line
[fill]
symbol = " "

# === DIRECTORY ===
[directory]
truncation_length = 4                                      # Show last 4 segments — full path gets unwieldy
truncate_to_repo = true                                    # But keep full path within a git repo
read_only = "  "
read_only_style = "bold red"
style = "bold cyan"
format = "[ $path]($style)[$read_only]($read_only_style) "
home_symbol = "~"

# === GIT BRANCH ===
[git_branch]
symbol = " "
format = "on [$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"
truncation_length = 30
truncation_symbol = "…"

# === GIT STATUS ===
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "⚡${count}"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↕↑${ahead_count}↓${behind_count}"
untracked = "?${count}"
stashed = "⚑${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✖${count}"

# === GIT METRICS ===
[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
only_nonzero_diffs = true                                           # Hide when nothing changed

# === LANGUAGE VERSIONS ===
# All auto-detect from project files — only shown when relevant

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol = " "
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
detect_files = [
  "requirements.txt",
  "pyproject.toml",
  "setup.py",
  ".python-version",
]

[rust]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold red"
detect_files = ["Cargo.toml"]

[golang]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold cyan"
detect_files = ["go.mod", "go.sum"]

[lua]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold blue"
detect_files = [".lua-version"]
detect_folders = ["lua"]

# === DOCKER ===
[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
style = "bold blue"
only_with_files = true                                                     # Only show when docker-compose.yml etc. present
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# === TIME ===
[time]
disabled = false
time_format = "%H:%M"       # Drop seconds — cleaner, updates less aggressively
format = "[ $time]($style)"
style = "bold dimmed white"

# === BATTERY ===
[battery]
full_symbol = "󰁹"
charging_symbol = "󰂄"
discharging_symbol = "󰂃"
unknown_symbol = "󰁽"
empty_symbol = "󰂎"
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

[[battery.display]]
threshold = 100
style = "bold green"

# === USERNAME ===
# Only shown over SSH or as root
[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold yellow"
style_root = "bold red"

# === HOSTNAME ===
[hostname]
ssh_only = true
ssh_symbol = " "
format = "[$ssh_symbol$hostname]($style) in "
style = "bold green"

# === COMMAND DURATION ===
[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold yellow"
show_milliseconds = false
show_notifications = false

# === PACKAGE VERSION ===
[package]
symbol = " "
format = "is [$symbol$version]($style) "
style = "bold 208"
display_private = false

# === AWS ===
[aws]
symbol = " "
format = 'on [$symbol($profile )(\($region\) )]($style)'
style = "bold yellow"
force_display = false

# === KUBERNETES ===
[kubernetes]
disabled = false
symbol = "󱃾 "
format = 'on [$symbol$context( \($namespace\))]($style) '
style = "bold blue"

# === DISABLED CLUTTER ===
# These fire too often and add noise without value in most workflows
[conda]
disabled = true

[vcsh]
disabled = true

[fossil_branch]
disabled = true
