# ============================================================================
# General
# ============================================================================
[general]
live_config_reload = true

# ============================================================================
# Environment Variables
# ============================================================================
[env]
TERM = "xterm-256color"

# ============================================================================
# Window
# ============================================================================
[window]
title = "Alacritty"
decorations = "Full"
startup_mode = "Windowed"
dynamic_padding = true
opacity = 1.0
blur = false

[window.dimensions]
columns = 120
lines = 40

[window.padding]
x = 8
y = 8

[window.class]
instance = "Alacritty"
general = "Alacritty"

# ============================================================================
# Scrolling
# ============================================================================
[scrolling]
history = 50000
multiplier = 3

# ============================================================================
# Font
# ============================================================================
[font]
size = 19.0

[font.normal]
family = "MesloLGS Nerd Font Mono"
style = "Regular"

[font.bold]
family = "MesloLGS Nerd Font Mono"
style = "Bold"

[font.italic]
family = "MesloLGS Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "MesloLGS Nerd Font Mono"
style = "Bold Italic"

[font.offset]
x = 0
y = 1

[font.glyph_offset]
x = 0
y = 0

# ============================================================================
# Colors — Night Owl / Ocean theme
# ============================================================================
[colors.primary]
background = "#011423"
foreground = "#CBE0F0"

[colors.cursor]
text = "#011423"
cursor = "#47FF9C"

[colors.vi_mode_cursor]
text = "#011423"
cursor = "#47FF9C"

[colors.selection]
text = "#CBE0F0"
background = "#033259"

[colors.normal]
black   = "#214969"
red     = "#E52E2E"
green   = "#44FFB1"
yellow  = "#FFE073"
blue    = "#0FC5ED"
magenta = "#a277ff"
cyan    = "#24EAF7"
white   = "#CBE0F0"

[colors.bright]
black   = "#214969"
red     = "#E52E2E"
green   = "#44FFB1"
yellow  = "#FFE073"
blue    = "#A277FF"
magenta = "#a277ff"
cyan    = "#24EAF7"
white   = "#CBE0F0"

# ============================================================================
# Bell
# ============================================================================
[bell]
animation = "EaseOutExpo"
duration = 100
color = "#47FF9C"

# ============================================================================
# Cursor
# ============================================================================
[cursor]
blink_interval = 700
blink_timeout = 0
unfocused_hollow = true

[cursor.style]
shape = "Beam"
blinking = "On"

# ============================================================================
# Mouse
# ============================================================================
[mouse]
hide_when_typing = true

# ============================================================================
# Selection
# ============================================================================
[selection]
save_to_clipboard = true
semantic_escape_chars = ''',│`|:"' ()[]{}<>\t'''

# ============================================================================
# Hints (URL detection)
# ============================================================================
[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\\\^⟨⟩`]+"

[hints.enabled.mouse]
enabled = true

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

# ============================================================================
# Keyboard Bindings
# Note: Copy (C-S-c), Paste (C-S-v), NewWindow (C-S-n), SearchForward (C-S-f),
# IncreaseFontSize (C-S-=), DecreaseFontSize (C--), ResetFontSize (C-0)
# are all Alacritty defaults on Linux — only non-defaults are listed here.
# ============================================================================
[[keyboard.bindings]]
action = "ClearHistory"
key = "L"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "SearchBackward"
key = "B"
mode = "~Search"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "SearchNext"
key = "J"
mode = "Search"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "SearchPrevious"
key = "K"
mode = "Search"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"
