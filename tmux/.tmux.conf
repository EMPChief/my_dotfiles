# ============================================
# Terminal & Color Settings
# ============================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:RGB"

# ============================================
# Prefix Key
# ============================================
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# ============================================
# Window Splitting
# ============================================
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ============================================
# Config Reload
# ============================================
unbind r
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# ============================================
# Pane Resizing
# ============================================
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# ============================================
# Session Management
# ============================================
bind M-c attach-session -c "#{pane_current_path}"
set -g detach-on-destroy off

# ============================================
# Mouse Support
# ============================================
set -g mouse on
set -g monitor-activity on
set -g visual-activity off
set -g bell-action none

# ============================================
# Vi Mode
# ============================================
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# ============================================
# Performance Tweaks
# ============================================
set -sg escape-time 0
set -g focus-events on
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g wrap-search off

# ============================================
# Window Numbering
# ============================================
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string "#S:#I:#W - #T"
setw -g automatic-rename on

# ============================================
# Quick Window Switching (Alt + number)
# ============================================
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ============================================
# Clear screen (C-l is taken by vim-tmux-navigator)
# ============================================
bind C-l send-keys 'C-l'

# ============================================
# Status Bar Position
# ============================================
set -g status-position top

# ============================================
# OSAKA JADE THEME COLORS
# ============================================
osaka_bg="#1a1b26"
osaka_fg="#c0caf5"
osaka_selection="#33467C"
osaka_comment="#565f89"
osaka_cyan="#7dcfff"
osaka_green="#9ece6a"
osaka_jade="#73daca"
osaka_teal="#1abc9c"
osaka_purple="#bb9af7"
osaka_magenta="#c678dd"
osaka_orange="#ff9e64"
osaka_yellow="#e0af68"
osaka_red="#f7768e"
osaka_blue="#7aa2f7"
osaka_dark_bg="#16161e"
osaka_sidebar="#1f2335"

# ============================================
# Status Bar Styling - Osaka Jade
# ============================================
set -g status-style "bg=$osaka_dark_bg,fg=$osaka_fg"
set -g status-left-length 100
set -g status-right-length 100

set -g status-left "#[fg=$osaka_dark_bg,bg=$osaka_jade,bold] 󰊠 #S #[fg=$osaka_jade,bg=$osaka_dark_bg]"
set -g status-right "#{prefix_highlight} #[fg=$osaka_teal,bg=$osaka_dark_bg] #[fg=$osaka_dark_bg,bg=$osaka_teal] %H:%M #[fg=$osaka_jade,bg=$osaka_dark_bg] #[fg=$osaka_dark_bg,bg=$osaka_jade] 󰃭 %d-%b-%y "

set -g window-status-format "#[fg=$osaka_comment,bg=$osaka_dark_bg] #I:#W "
set -g window-status-current-format "#[fg=$osaka_dark_bg,bg=$osaka_jade,bold] #I:#W #[fg=$osaka_jade,bg=$osaka_dark_bg]"
set -g window-status-separator ""

# ============================================
# Pane Borders - Osaka Jade
# ============================================
set -g pane-border-style "fg=$osaka_selection"
set -g pane-active-border-style "fg=$osaka_jade"

# ============================================
# Message Styling
# ============================================
set -g message-style "bg=$osaka_jade,fg=$osaka_dark_bg,bold"
set -g message-command-style "bg=$osaka_teal,fg=$osaka_dark_bg,bold"

# ============================================
# Copy Mode Styling
# ============================================
set -g mode-style "bg=$osaka_jade,fg=$osaka_dark_bg"

# ============================================
# Clock Mode
# ============================================
setw -g clock-mode-colour "$osaka_jade"

# ============================================
# TPM Plugins
# ============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-sessionist'

# ============================================
# Plugin Settings
# ============================================
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

set -g @tmux-fzf-launch-key 'C-f'

set -g @yank_action 'copy-pipe-no-clear'

set -g @prefix_highlight_fg "$osaka_dark_bg"
set -g @prefix_highlight_bg "$osaka_purple"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=$osaka_dark_bg,bg=$osaka_yellow,bold"
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_sync_mode_attr "fg=$osaka_dark_bg,bg=$osaka_red,bold"

# ============================================
# Initialize TPM (keep at bottom)
# ============================================
run '~/.tmux/plugins/tpm/tpm'
